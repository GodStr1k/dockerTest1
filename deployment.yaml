apiVersion: apps/v1
kind: Deployment
metadata:
name: html-demo
spec:
replicas: 2
selector:
matchLabels:
app: html-demo
template:
metadata:
labels:
app: html-demo
spec:
containers:
- name: html-demo
image: godstr1k/html-demo:latest
ports:
- containerPort: 81
---
apiVersion: v1
kind: Service
metadata:
name: html-demo-service
spec:
type: NodePort
selector:
app: html-demo
ports:
- port: 81
targetPort: 81
nodePort: 30010